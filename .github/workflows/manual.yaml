name: Manual

on:
  workflow_dispatch:  # 支持手动运行
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: windows-latest  # Electron 打包需要 Windows
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portable version
        run: |
          npm run build
          npm run package
        env:
          # 防止 electron-builder 询问证书
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get release version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          fi
          VERSION=$(echo "$TAG" | sed 's/^v//')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "final_name=Game Save Manager Portable $VERSION.exe" >> $GITHUB_OUTPUT

      - name: Find portable executable
        id: find_file
        run: |
          # electron-builder 输出的便携版位置
          # 通常格式：dist/Game Save Manager.exe
          if [ -f "dist/Game Save Manager.exe" ]; then
            echo "source=dist/Game Save Manager.exe" >> $GITHUB_OUTPUT
          else
            # 查找其他可能的位置
            EXE=$(find . -name "*.exe" -path "*/dist/*" -not -name "*-*" | head -1)
            if [ -n "$EXE" ]; then
              echo "source=$EXE" >> $GITHUB_OUTPUT
            else
              echo "❌ Portable executable not found"
              exit 1
            fi
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          FINAL_NAME="${{ steps.get_version.outputs.final_name }}"
          SOURCE_FILE="${{ steps.find_file.outputs.source }}"
          
          # 重命名文件为更友好的名称
          mv "$SOURCE_FILE" "./${FINAL_NAME}"
          
          # 检查 release 是否存在
          if gh release view "$TAG" &>/dev/null; then
            echo "✅ Release $TAG exists, uploading asset..."
          else
            echo "📦 Creating new release $TAG..."
            gh release create "$TAG" \
              --title "Game Save Manager ${{ steps.get_version.outputs.version }}" \
              --notes "🎮 Automated portable release for version ${{ steps.get_version.outputs.version }}" \
              --latest
          fi
          
          # 上传便携版文件（覆盖已存在的）
          gh release upload "$TAG" "./${FINAL_NAME}" --clobber
          
          echo "✅ Uploaded: ${FINAL_NAME}"

      - name: Verify upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          FINAL_NAME="${{ steps.get_version.outputs.final_name }}"
          
          # 使用 jq 精确验证
          if gh release view "$TAG" --json assets | jq -r '.assets[].name' | grep -Fx "$FINAL_NAME"; then
            echo "🎉 Successfully released $FINAL_NAME"
          else
            echo "❌ Upload verification failed"
            exit 1
          fi